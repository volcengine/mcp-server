name: Codex Plugin Scanner

on:
  push:
    branches: [main]
    paths:
      - '.codex-plugin/**'
      - '.mcp.json'
  pull_request:
    paths:
      - '.codex-plugin/**'
      - '.mcp.json'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashgraph-online/hol-codex-plugin-scanner-action@v1
          mode: validate