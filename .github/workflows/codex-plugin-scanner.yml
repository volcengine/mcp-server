name: Codex Plugin Scanner

on:
  push:
    branches: [main]
    paths:
      - '.codex-plugin/**'
      - '.mcp.json'
  pull_request:
    paths:
      - '.codex-plugin/**'
      - '.mcp.json'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashgraph-online/codex-plugin-scanner@v1
        with:
          mode: validate